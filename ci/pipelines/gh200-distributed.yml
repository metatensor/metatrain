include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

stages:
  - build
  - test

variables:
  # Image needs to be public to use the lightweight runner
  PERSIST_IMAGE_NAME: $CSCS_REGISTRY_PATH/public/metatrain-distributed:$CI_COMMIT_SHORT_SHA

build_job:
  stage: build
  extends: .container-builder-cscs-gh200
  variables:
    DOCKERFILE: ci/containers/Containerfile

test_job:
  stage: test
  extends: .container-runner-daint-gh200
  image: $PERSIST_IMAGE_NAME
  timeout: 1h
  script:
    - source /mtt-venv/bin/activate
    - cd tests/distributed
    - mtt train options-distributed.yaml
  variables:
    SLURM_JOB_NUM_NODES: 1
    SLURM_PARTITION: normal
    SLURM_NTASKS: 4
    SLURM_GPUS_PER_TASK: 1
    SLURM_CPUS_PER_TASK: 16
    SLURM_TIMELIMIT: '00:45:00'
    GIT_STRATEGY: fetch
    USE_NCCL: 'cuda12'
