include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

stages:
  - build
  - install
  - test

variables:
  PERSIST_IMAGE_NAME: $CSCS_REGISTRY_PATH/metatrain-distributed:$CI_COMMIT_SHORT_SHA

build_job:
  stage: build
  extends: .container-builder-cscs-gh200
  variables:
    DOCKERFILE: ci/containers/Containerfile

install_job:
  stage: install
  extends: .container-runner-lightweight-gh200
  image: $PERSIST_IMAGE_NAME
  timeout: 30m
  script:
    - python3 -m venv ./mtt-venv
    - source ./mtt-venv/bin/activate
    - which python
    - python -m pip install -e .
  variables:
    SLURM_JOB_NUM_NODES: 1
    SLURM_PARTITION: normal
    SLURM_NTASKS: 1
    SLURM_CPUS_PER_TASK: 4
    SLURM_TIMELIMIT: '00:10:00'

test_job:
  stage: test
  extends: .container-runner-daint-gh200
  image: $PERSIST_IMAGE_NAME
  timeout: 1h
  script:
    - source ./mtt-venv/bin/activate
    - cd tests/distributed
    - mtt train options-distributed.yaml
  variables:
    SLURM_JOB_NUM_NODES: 1
    SLURM_PARTITION: normal
    SLURM_NTASKS: 4
    SLURM_GPUS_PER_TASK: 1
    SLURM_CPUS_PER_TASK: 16
    SLURM_TIMELIMIT: '00:45:00'
    GIT_STRATEGY: fetch
    USE_NCCL: 'cuda12'
