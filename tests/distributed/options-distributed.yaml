seed: 42
device: cuda

architecture:
  name: pet
  training:
    # distributed is left at its default "auto": the multi-task SLURM launch
    # of this test must be detected and enable distributed training
    batch_size: 25
    num_epochs: 5

training_set:
  systems:
    read_from: ethanol_reduced_100.xyz
    length_unit: angstrom
  targets:
    energy:
      key: energy
      unit: eV
      forces: true

test_set: 0.0
validation_set: 0.5
