seed: 42
base_precision: 32

architecture:
  name: experimental.soap_bpnn
  training:
    batch_size: 16
    num_epochs: 10000
    log_interval: 1
    scheduler_patience: 10

training_set:
  systems:
    read_from: ethanol_reduced_100.xyz
    length_unit: angstrom
  targets:
    energy:
      key: energy
      unit: meV

test_set: 0.1
validation_set: 0.1
