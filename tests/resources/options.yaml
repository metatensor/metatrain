seed: 42
base_precision: 32

architecture:
  name: experimental.soap_bpnn
  training:
    batch_size: 16
    num_epochs: 5
    log_interval: 1

training_set:
  systems:
    read_from: train.xyz
    length_unit: angstrom
  targets:
    energy:
      key: energy
      unit: eV

validation_set: 0.02
test_set: 0.9
