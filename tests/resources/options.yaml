seed: 42

architecture:
  name: experimental.nanopet
  training:
    batch_size: 10
    num_epochs: 1500

training_set:
  systems:
    read_from: ethanol_reduced_100.xyz  # ethanol_disk/
    length_unit: angstrom
  targets:
    energy:
      key: energy
      unit: kcal/mol
      forces: on

test_set: 0.90
validation_set: 0.05
