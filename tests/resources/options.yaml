seed: 42
base_precision: 32

architecture:
  name: experimental.pet
  training:
    EPOCH_NUM_ATOMIC: 100000
    ATOMIC_BATCH_SIZE: 100

training_set:
  systems:
    read_from: train.xyz
    length_unit: angstrom
  targets:
    energy:
      key: energy
      unit: eV

validation_set: 0.02
test_set: 0.9
