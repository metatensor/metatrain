# Stock suite-native E-PET configuration for the PET-OMat-style XS32 comparison.
#
# This file fixes the PET XS32 backbone, trainer regime, and loss surface for the
# E-PET Cartesian rank-2 direct-stress workflow. E-PET predicts hidden spherical
# l=0/l=2 stress components internally, reconstructs public Cartesian stress, and
# applies volume normalization only to that public stress target. Before running,
# replace the dataset paths below with your local train/test XYZ files.
#
# Example invocation:
#   python -m metatrain train examples/1-advanced/options-e-pet-pet-omat-xs32.yaml

seed: 1234
base_precision: 32

architecture:
  name: experimental.e_pet
  model:
    volume_normalized_targets:
      - mtt::stress
    pet:
      cutoff: 7.5
      cutoff_function: Bump
      cutoff_width: 0.5
      num_neighbors_adaptive: 32
      d_pet: 128
      d_head: 128
      d_node: 512
      d_feedforward: 256
      num_heads: 8
      num_attention_layers: 1
      num_gnn_layers: 2
      normalization: RMSNorm
      activation: SwiGLU
      attention_temperature: 1.0
      transformer_type: PreLN
      featurizer_type: feedforward
      zbl: false
    tensor_basis_defaults:
      # PET-OMat E-PET basis settings. Angular order is target-derived.
      add_lambda_basis: true
      legacy: false
      soap:
        max_radial: 3
        cutoff:
          radius: 7.5
          width: 0.5
      extra_l1_vector_basis_branches:
        - max_radial: 3
          cutoff:
            radius: 7.5
            width: 0.5
  training:
    batch_size: 16
    num_epochs: 100
    # Keep PET trunk, heads, and coefficient readouts at the PET baseline rate;
    # only tensor-basis modules use the faster optional rate.
    learning_rate: 2.0e-4
    tensor_basis_learning_rate: 1.0e-3
    warmup_fraction: 0.1
    checkpoint_interval: 10
    basis_gram_weight: 1.0e-3
    coefficient_l2_weight: 1.0e-5
    coefficient_l2_exclude_spherical_l0: true
    log_interval: 1
    scale_targets: true
    best_model_metric: loss
    num_workers: 4
    per_structure_targets:
      - energy
      - mtt::stress
    loss:
      energy:
        type: huber
        weight: 1.0
        reduction: mean
        delta: 0.015
        gradients:
          positions:
            type: invariant_huber
            weight: 1.0
            reduction: mean
            delta: 0.04
          strain:
            type: invariant_huber
            weight: 1.0
            reduction: mean
            delta: 0.03
      "mtt::forces_l1":
        type: invariant_huber
        weight: 0.01
        reduction: mean
        delta: 0.01
      "mtt::stress":
        type: invariant_huber
        weight: 5.0e-4
        reduction: mean
        delta: 0.005

training_set:
  systems:
    read_from: /path/to/mad-subset-train-joint-spherical.xyz
    reader: ase
    length_unit: angstrom
  targets:
    energy:
      quantity: energy
      read_from: /path/to/mad-subset-train-joint-spherical.xyz
      reader: ase
      key: energy
      unit: eV
      type: scalar
      per_atom: false
      num_subtargets: 1
      forces: true
      stress: true
      virial: false
    "mtt::forces_l1":
      quantity: forces_l1
      read_from: /path/to/mad-subset-train-joint-spherical.xyz
      reader: ase
      key: forces_l1
      unit: ""
      type:
        spherical:
          irreps:
            - o3_lambda: 1
              o3_sigma: 1
      per_atom: true
      num_subtargets: 1
    "mtt::stress":
      quantity: stress
      read_from: /path/to/mad-subset-train-joint-spherical.xyz
      reader: ase
      key: stress
      unit: eV/angstrom^3
      type:
        cartesian:
          rank: 2
      per_atom: false
      num_subtargets: 1

validation_set: 0.1

test_set:
  systems:
    read_from: /path/to/mad-subset-test-joint-spherical.xyz
    reader: ase
    length_unit: angstrom
  targets:
    energy:
      quantity: energy
      read_from: /path/to/mad-subset-test-joint-spherical.xyz
      reader: ase
      key: energy
      unit: eV
      type: scalar
      per_atom: false
      num_subtargets: 1
      forces: true
      stress: true
      virial: false
    "mtt::forces_l1":
      quantity: forces_l1
      read_from: /path/to/mad-subset-test-joint-spherical.xyz
      reader: ase
      key: forces_l1
      unit: ""
      type:
        spherical:
          irreps:
            - o3_lambda: 1
              o3_sigma: 1
      per_atom: true
      num_subtargets: 1
    "mtt::stress":
      quantity: stress
      read_from: /path/to/mad-subset-test-joint-spherical.xyz
      reader: ase
      key: stress
      unit: eV/angstrom^3
      type:
        cartesian:
          rank: 2
      per_atom: false
      num_subtargets: 1
