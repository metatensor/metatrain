# architecture used to train the model
architecture:
  name: experimental.gap
  model:
    filename: /home/apaulish/Documents/code/metatrain/experiments/si_tiny/xyz_datasets/dft_energy_error.dat
    # krr:
    #   degree: 2
    #   num_sparse_points: 84
  training:
    regularizer: 0.001 # used only in homoscedastic noise model
    # num_epochs: 100 # a very short training run

# Mandatory section defining the parameters for system and target data of the
# training set
training_set:
  systems: "xyz_datasets/si_tiny_ecut18_energy_force_errors_CLEAN.xyz" # file where the positions are stored
  targets:
    energy:
      key: "dft_energy" # name of the target value
      unit: "eV" # unit of the target value
      forces: off

test_set: 
  systems: "data/dia-gap-si-18.xyz" # 10 % of the training_set are randomly split and taken for test set
  targets:
    energy:
      key: "energy" # name of the target value
      unit: "eV" # unit of the target value
      forces: off

validation_set: 
  systems: "data/vacancy_gap.xyz" # 10 % of the training_set are randomly split and for validation
  targets:
    energy:
      key: "energy" # name of the target value
      unit: "eV" # unit of the target value
      forces: off
